name: Deploy portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/portfolio/package-lock.json

      - name: Install dependencies
        working-directory: apps/portfolio
        run: npm ci

      - name: Lint
        working-directory: apps/portfolio
        run: npm run lint

      - name: Build
        working-directory: apps/portfolio
        run: npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.ALIYUN_PORT }}" "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.ALIYUN_PORT }}" \
            apps/portfolio/dist/ "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}:/var/www/personal-portfolio/"

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.ALIYUN_PORT }}" \
            "${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }}" \
            "sudo nginx -t && sudo systemctl reload nginx"
